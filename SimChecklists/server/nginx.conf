# Nginx reverse proxy config for SimChecklists
# Usage: place this in your site config (e.g., /etc/nginx/sites-available/simchecklists)
# and symlink to /etc/nginx/sites-enabled/, then reload nginx.
#
# The frontend calls /api/weather/* which nginx forwards to
# https://aviationweather.gov/api/data/* — bypassing CORS.

server {
    listen 80;
    server_name your-domain.com;  # replace with your domain

    root /var/www/simchecklists/dist;  # path to your built static files
    index index.html;

    # Serve static files
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy Aviation Weather API requests to avoid CORS
    location /api/weather/ {
        proxy_pass https://aviationweather.gov/api/data/;
        proxy_set_header Host aviationweather.gov;
        proxy_set_header User-Agent "SimChecklists/1.0";
        proxy_ssl_server_name on;
    }
}
